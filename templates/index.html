<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veículos Cadastrados</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 2em;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        h1 {
            color: #061b36;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #061b36;
            color: white;
        }
        img {
            max-width: 100px;
            height: auto;
        }

        .foto-zoom {
            width: 300px; /* Defina o tamanho inicial da sua foto */
            transition: transform 0.3s ease; /* Cria o efeito de transição suave */
        }

        .foto-zoom:hover {
            transform: scale(3.5); /* Aumenta a foto em 10% quando o mouse passa por cima */
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Veículos Cadastrados</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Modelo</th>
                <th>Marca</th>
                <th>Ano</th>
                <th>Preço</th>
                <th>Foto</th>
            </tr>
        </thead>
        <tbody>
            {% for veiculo in veiculos %}
            <tr>
                <td>{{ veiculo.id }}</td>
                <td>{{ veiculo.modelo }}</td>
                <td>{{ veiculo.marca }}</td>
                <td>{{ veiculo.ano }}</td>
                <td>R$ {{ "%.2f"|format(veiculo.preco|float) }}</td>
                <td><img src="{{ veiculo.foto }}" alt="{{ veiculo.modelo }}" class="foto-zoom"></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
